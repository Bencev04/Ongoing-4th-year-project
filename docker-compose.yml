# CRM Calendar Microservices - Docker Compose Configuration
# Orchestrates all services with PostgreSQL database
# NGINX gateway is the single public entry point on port 80

services:
  # ===========================================================================
  # NGINX API Gateway — single public entry point
  # ===========================================================================
  nginx-gateway:
    build:
      context: ./services
      dockerfile: nginx/Dockerfile
    container_name: crm_nginx_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-bl-service:
        condition: service_healthy
      job-bl-service:
        condition: service_healthy
      customer-bl-service:
        condition: service_healthy
      admin-bl-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - crm_network

  # ===========================================================================
  # Database
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: crm_calendar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_calendar}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      - ./scripts/seed-demo-data.sql:/docker-entrypoint-initdb.d/02-seed-demo-data.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_calendar}"]
      interval: 3s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

  # ===========================================================================
  # Redis Cache — token blacklist, session store, response caching
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - crm_network

  # ===========================================================================
  # DB Access Layer (internal only — no external ports)
  # ===========================================================================

  user-db-access-service:
    build:
      context: ./services
      dockerfile: user-db-access-service/Dockerfile
    container_name: crm_user_db_access_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@db:5432/${POSTGRES_DB:-crm_calendar}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-false}
    expose:
      - "8001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

  customer-db-access-service:
    build:
      context: ./services
      dockerfile: customer-db-access-service/Dockerfile
    container_name: crm_customer_db_access_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@db:5432/${POSTGRES_DB:-crm_calendar}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-false}
    expose:
      - "8002"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

  job-db-access-service:
    build:
      context: ./services
      dockerfile: job-db-access-service/Dockerfile
    container_name: crm_job_db_access_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@db:5432/${POSTGRES_DB:-crm_calendar}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-false}
    expose:
      - "8003"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

  # ===========================================================================
  # Business Logic Layer (internal — proxied through NGINX)
  # ===========================================================================

  auth-service:
    build:
      context: ./services
      dockerfile: auth-service/Dockerfile
    container_name: crm_auth_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@db:5432/${POSTGRES_DB:-crm_calendar}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      USER_SERVICE_URL: http://user-db-access-service:8001
      REDIS_URL: redis://redis:6379/0
      DEBUG: ${DEBUG:-false}
    expose:
      - "8005"
    depends_on:
      db:
        condition: service_healthy
      user-db-access-service:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/api/v1/health')"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

  user-bl-service:
    build:
      context: ./services
      dockerfile: user-bl-service/Dockerfile
    container_name: crm_user_bl_service
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-db-access-service:8001
      AUTH_SERVICE_URL: http://auth-service:8005
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      REDIS_URL: redis://redis:6379/1
      DEBUG: ${DEBUG:-false}
    expose:
      - "8004"
    depends_on:
      - user-db-access-service
      - auth-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/api/v1/health')"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

  job-bl-service:
    build:
      context: ./services
      dockerfile: job-bl-service/Dockerfile
    container_name: crm_job_bl_service
    restart: unless-stopped
    environment:
      JOB_SERVICE_URL: http://job-db-access-service:8003
      CUSTOMER_SERVICE_URL: http://customer-db-access-service:8002
      USER_SERVICE_URL: http://user-db-access-service:8001
      AUTH_SERVICE_URL: http://auth-service:8005
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      REDIS_URL: redis://redis:6379/2
      DEBUG: ${DEBUG:-false}
    expose:
      - "8006"
    depends_on:
      - job-db-access-service
      - customer-db-access-service
      - user-db-access-service
      - auth-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/api/v1/health')"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

  customer-bl-service:
    build:
      context: ./services
      dockerfile: customer-bl-service/Dockerfile
    container_name: crm_customer_bl_service
    restart: unless-stopped
    environment:
      CUSTOMER_SERVICE_URL: http://customer-db-access-service:8002
      JOB_SERVICE_URL: http://job-db-access-service:8003
      AUTH_SERVICE_URL: http://auth-service:8005
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      REDIS_URL: redis://redis:6379/3
      DEBUG: ${DEBUG:-false}
    expose:
      - "8007"
    depends_on:
      - customer-db-access-service
      - job-db-access-service
      - auth-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/api/v1/health')"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

  # ===========================================================================
  # Admin BL Service — superadmin-only platform administration
  # ===========================================================================

  admin-bl-service:
    build:
      context: ./services
      dockerfile: admin-bl-service/Dockerfile
    container_name: crm_admin_bl_service
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-db-access-service:8001
      AUTH_SERVICE_URL: http://auth-service:8005
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      REDIS_URL: redis://redis:6379/4
      DEBUG: ${DEBUG:-false}
    expose:
      - "8008"
    depends_on:
      - user-db-access-service
      - auth-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/api/v1/health')"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

  # ===========================================================================
  # Frontend (internal — served to clients through NGINX)
  # ===========================================================================

  frontend:
    build:
      context: ./services
      dockerfile: frontend/Dockerfile
    container_name: crm_frontend
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-bl-service:8004
      CUSTOMER_SERVICE_URL: http://customer-bl-service:8007
      JOB_SERVICE_URL: http://job-bl-service:8006
      AUTH_SERVICE_URL: http://auth-service:8005
      ADMIN_BL_SERVICE_URL: http://admin-bl-service:8008
      DEBUG: ${DEBUG:-false}
    expose:
      - "8000"
    depends_on:
      - auth-service
      - user-bl-service
      - customer-bl-service
      - job-bl-service
      - admin-bl-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - crm_network

# Volumes for persistent data
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Network for inter-service communication
networks:
  crm_network:
    driver: bridge
