<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Workflow Platform</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:  '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        navy: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#1e3a5f',
                            700: '#1a3354',
                            800: '#152b49',
                            900: '#0f1f35',
                        },
                        teal: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        },
                        orange: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                            800: '#9a3412',
                            900: '#7c2d12',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full">
    <div class="min-h-full flex items-center justify-center px-4 sm:px-6 lg:px-8"
         x-data="loginApp()">

        <div class="w-full max-w-md space-y-8">
            <!-- Header -->
            <div class="text-center">
                <div class="flex justify-center mb-4">
                    <img src="/static/images/logo-icon.png" alt="Workflow Platform Logo" class="h-48 w-auto">
                </div>
                <h1 class="text-3xl font-bold text-gray-900 mb-2">WORKFLOW PLATFORM</h1>
                <p class="mt-2 text-sm text-gray-600">Sign in to your account</p>
            </div>

            <!-- Error Message -->
            <div x-show="errorMessage"
                 x-transition
                 class="rounded-md bg-red-50 p-4">
                <div class="flex">
                    <svg class="h-5 w-5 text-red-400 mr-2 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-sm text-red-700" x-text="errorMessage"></p>
                </div>
            </div>

            <!-- Login Form -->
            <form @submit.prevent="handleLogin()" class="mt-8 space-y-6 bg-white p-8 rounded-lg shadow">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                           x-model="email"
                           class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm
                                  placeholder-gray-400 focus:border-teal-500 focus:outline-none focus:ring-1
                                  focus:ring-teal-500 sm:text-sm"
                           placeholder="you@example.com">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input id="password" name="password" type="password" required autocomplete="current-password"
                           x-model="password"
                           class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm
                                  placeholder-gray-400 focus:border-teal-500 focus:outline-none focus:ring-1
                                  focus:ring-teal-500 sm:text-sm"
                           placeholder="••••••••">
                </div>

                <!-- Submit -->
                <button type="submit"
                        :disabled="loading"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md
                               shadow-sm text-sm font-medium text-white bg-navy-600 hover:bg-navy-700
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500
                               disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                    <svg x-show="loading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor"
                              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span x-text="loading ? 'Signing in…' : 'Sign in'"></span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function loginApp() {
            return {
                email: '',
                password: '',
                loading: false,
                errorMessage: '',

                async handleLogin() {
                    this.loading = true;
                    this.errorMessage = '';

                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: this.email,
                                password: this.password
                            })
                        });

                        if (response.ok) {
                            const data = await response.json();
                            // Store tokens
                            localStorage.setItem('access_token', data.access_token);
                            localStorage.setItem('refresh_token', data.refresh_token);
                            localStorage.setItem('user_id', data.user_id);
                            localStorage.setItem('owner_id', data.owner_id);
                            localStorage.setItem('user_role', data.role);

                            // Redirect to calendar (or original destination)
                            const next = new URLSearchParams(window.location.search).get('next') || '/calendar';
                            window.location.href = next;
                        } else {
                            const err = await response.json().catch(() => null);
                            this.errorMessage = err?.detail || 'Invalid email or password.';
                        }
                    } catch (error) {
                        this.errorMessage = 'Unable to reach the server. Please try again.';
                        console.error('Login error:', error);
                    } finally {
                        this.loading = false;
                    }
                }
            };
        }
    </script>
</body>
</html>
