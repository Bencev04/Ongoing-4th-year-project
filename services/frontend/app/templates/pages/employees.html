{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-6"
     x-data="employeesApp()"
     x-init="init()">

    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Employees</h1>

        <button @click="openInviteModal()"
                class="inline-flex items-center px-4 py-2 bg-teal-500 text-white text-sm font-medium rounded-md hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-400 transition-colors">
            <svg class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Add Employee
        </button>
    </div>

    <!-- Loading indicator -->
    <div x-show="loading" class="text-center py-12">
        <svg class="animate-spin h-8 w-8 text-teal-500 mx-auto" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="mt-2 text-sm text-gray-500">Loading employees…</p>
    </div>

    <!-- Error message -->
    <div x-show="error" x-cloak
         class="rounded-md bg-red-50 p-4 mb-6">
        <div class="flex">
            <svg class="h-5 w-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="ml-3 text-sm text-red-700" x-text="error"></p>
        </div>
    </div>

    <!-- Empty state -->
    <div x-show="!loading && !error && employees.length === 0" x-cloak
         class="text-center py-12 bg-white rounded-lg shadow">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <h3 class="mt-2 text-sm font-medium text-gray-900">No employees</h3>
        <p class="mt-1 text-sm text-gray-500">Get started by adding your first employee.</p>
    </div>

    <!-- Employees table -->
    <div x-show="!loading && employees.length > 0" x-cloak
         class="bg-white shadow overflow-hidden sm:rounded-lg">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Position</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Skills</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Hourly Rate</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <template x-for="emp in employees" :key="emp.id">
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="h-8 w-8 rounded-full bg-primary-100 flex items-center justify-center">
                                    <span class="text-sm font-medium text-primary-700"
                                          x-text="(emp.first_name?.[0] || '') + (emp.last_name?.[0] || '')"></span>
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-medium text-gray-900"
                                         x-text="(emp.first_name || '') + ' ' + (emp.last_name || '')"></div>
                                    <div class="text-sm text-gray-500" x-text="emp.email || ''"></div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="emp.position || '—'"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="emp.skills || '—'"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span x-show="emp.hourly_rate != null" x-text="'€' + Number(emp.hourly_rate).toFixed(2)"></span>
                            <span x-show="emp.hourly_rate == null">—</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button @click="viewEmployee(emp.id)"
                                    class="text-primary-600 hover:text-primary-900">View</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    /**
     * Alpine.js component for employee management.
     * Handles loading, displaying, and interacting with employee data.
     * 
     * @returns {Object} Alpine.js component object
     */
    function employeesApp() {
        return {
            /** @type {Array<Object>} List of employee objects */
            employees: [],
            
            /** @type {boolean} Loading state indicator */
            loading: true,
            
            /** @type {string|null} Error message to display to user */
            error: null,

            /**
             * Initialize the component on page load.
             * Redirects superadmin to the admin portal (no tenant context).
             * Automatically loads employee data from the API.
             * 
             * @returns {Promise<void>}
             */
            async init() {
                // Superadmin has no tenant — redirect to admin portal
                if (getUserRole() === 'superadmin') {
                    window.location.href = '/admin';
                    return;
                }
                await this.loadEmployees();
            },

            /**
             * Load all employees from the backend API.
             * Uses authFetch to automatically inject JWT authentication token.
             * Handles token refresh on 401 errors automatically via authFetch.
             * 
             * API Endpoint: GET /api/employees/
             * 
             * @returns {Promise<void>}
             * @throws {Error} If authentication fails or server returns error
             */
            async loadEmployees() {
                this.loading = true;
                this.error = null;
                
                try {
                    // Use authFetch (from base.html) to automatically inject Bearer token
                    const resp = await authFetch('/api/employees/', {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    // Check for HTTP errors
                    if (!resp.ok) {
                        // Handle 401 Unauthorized
                        if (resp.status === 401) {
                            throw new Error('Missing authentication credentials');
                        }
                        
                        // Handle 403 Forbidden
                        if (resp.status === 403) {
                            throw new Error('You do not have permission to view employees');
                        }
                        
                        // Parse error response if available
                        const data = await resp.json().catch(() => null);
                        const errorMsg = data?.detail || data?.message || `Server error (${resp.status})`;
                        throw new Error(errorMsg);
                    }
                    
                    // Parse successful response
                    this.employees = await resp.json();
                    
                    console.log(`Successfully loaded ${this.employees.length} employees`);
                    
                } catch (err) {
                    console.error('Failed to load employees:', err);
                    
                    // Set user-friendly error message
                    if (err.message.includes('authentication')) {
                        this.error = 'Authentication required. Please log in again.';
                    } else if (err.message.includes('permission')) {
                        this.error = 'You do not have permission to view employees.';
                    } else if (err.message.includes('fetch')) {
                        this.error = 'Unable to connect to server. Please check your connection.';
                    } else {
                        this.error = err.message || 'Failed to load employees. Please try again.';
                    }
                } finally {
                    this.loading = false;
                }
            },

            /**
             * Open modal to invite/add a new employee.
             * TODO: Implement invite modal functionality.
             * 
             * @returns {void}
             */
            openInviteModal() {
                console.log('[TODO] Open invite employee modal');
                // TODO: implement invite modal
                // Should show modal with form to invite new employee
            },

            /**
             * Navigate to employee detail view.
             * TODO: Implement employee detail page.
             * 
             * @param {number} id - Employee ID to view
             * @returns {void}
             */
            viewEmployee(id) {
                console.log(`[TODO] View employee with ID: ${id}`);
                // TODO: implement employee detail view
                // Could navigate to /employees/{id} or show modal
            }
        };
    }
</script>
{% endblock %}
