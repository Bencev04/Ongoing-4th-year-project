{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-3xl px-4 sm:px-6 lg:px-8 py-6"
     x-data="profileApp()"
     x-init="loadUserInfo()">

    <!-- Page Header -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Your Profile</h1>
        <p class="mt-1 text-sm text-gray-500">Manage your account settings and password</p>
    </div>

    <!-- Success Message -->
    <div x-show="successMessage" x-cloak
         class="rounded-md bg-green-50 p-4 mb-6"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform scale-95"
         x-transition:enter-end="opacity-100 transform scale-100">
        <div class="flex">
            <svg class="h-5 w-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="ml-3 text-sm text-green-700" x-text="successMessage"></p>
        </div>
    </div>

    <!-- Error Message -->
    <div x-show="error" x-cloak
         class="rounded-md bg-red-50 p-4 mb-6">
        <div class="flex">
            <svg class="h-5 w-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="ml-3 text-sm text-red-700" x-text="error"></p>
        </div>
    </div>

    <!-- Loading State -->
    <div x-show="loading" class="text-center py-12">
        <svg class="animate-spin h-8 w-8 text-teal-500 mx-auto" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="mt-2 text-sm text-gray-500">Loading...</p>
    </div>

    <div x-show="!loading" x-cloak class="space-y-6">

        <!-- User Information Card -->
        <div class="bg-white shadow rounded-lg">
            <div class="px-6 py-5 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">Account Information</h2>
            </div>
            <div class="px-6 py-5 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email</label>
                        <p class="mt-1 text-sm text-gray-900" x-text="userInfo.email || 'Loading...'"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Role</label>
                        <span class="mt-1 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                              :class="{
                                  'bg-purple-100 text-purple-800': userInfo.role === 'superadmin',
                                  'bg-blue-100 text-blue-800': userInfo.role === 'owner',
                                  'bg-green-100 text-green-800': userInfo.role === 'admin',
                                  'bg-yellow-100 text-yellow-800': userInfo.role === 'manager',
                                  'bg-gray-100 text-gray-800': userInfo.role === 'employee' || userInfo.role === 'viewer'
                              }"
                              x-text="userInfo.role || 'Loading...'">
                        </span>
                    </div>
                </div>
                <template x-if="userInfo.company_id">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Company ID</label>
                        <p class="mt-1 text-sm text-gray-900" x-text="userInfo.company_id"></p>
                    </div>
                </template>
            </div>
        </div>

        <!-- Change Password Card -->
        <div class="bg-white shadow rounded-lg">
            <div class="px-6 py-5 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">Change Password</h2>
                <p class="mt-1 text-sm text-gray-500">Update your password to keep your account secure</p>
            </div>
            <form @submit.prevent="changePassword()" class="px-6 py-5">
                <div class="space-y-4">
                    <div>
                        <label for="current-password" class="block text-sm font-medium text-gray-700">
                            Current Password *
                        </label>
                        <input type="password" 
                               id="current-password"
                               x-model="passwordForm.currentPassword"
                               required
                               minlength="8"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm border px-3 py-2">
                    </div>

                    <div>
                        <label for="new-password" class="block text-sm font-medium text-gray-700">
                            New Password *
                        </label>
                        <input type="password" 
                               id="new-password"
                               x-model="passwordForm.newPassword"
                               required
                               minlength="8"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm border px-3 py-2">
                        <p class="mt-1 text-xs text-gray-500">Minimum 8 characters</p>
                    </div>

                    <div>
                        <label for="confirm-password" class="block text-sm font-medium text-gray-700">
                            Confirm New Password *
                        </label>
                        <input type="password" 
                               id="confirm-password"
                               x-model="passwordForm.confirmPassword"
                               required
                               minlength="8"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm border px-3 py-2">
                    </div>
                </div>

                <div class="mt-6 flex items-center justify-between">
                    <a href="/calendar" 
                       class="text-sm text-gray-500 hover:text-gray-700 transition-colors">
                        ← Back to Calendar
                    </a>
                    <button type="submit"
                            :disabled="submitting"
                            :class="submitting ? 'opacity-50 cursor-not-allowed' : 'hover:bg-teal-600'"
                            class="inline-flex items-center px-4 py-2 bg-teal-500 text-white text-sm font-medium rounded-md transition-colors">
                        <span x-show="!submitting">Change Password</span>
                        <span x-show="submitting">Changing...</span>
                    </button>
                </div>
            </form>
        </div>

    </div>

</div>

<script>
/**
 * Alpine.js component for the profile page.
 */
function profileApp() {
    return {
        loading: true,
        submitting: false,
        error: null,
        successMessage: null,
        userInfo: {},
        passwordForm: {
            currentPassword: '',
            newPassword: '',
            confirmPassword: ''
        },

        /**
         * Load current user information from the auth service.
         */
        async loadUserInfo() {
            this.loading = true;
            this.error = null;
            try {
                const resp = await authFetch('/api/auth/me');
                if (!resp.ok) {
                    throw new Error('Failed to load user information');
                }
                this.userInfo = await resp.json();
            } catch (err) {
                console.error('Failed to load user info:', err);
                this.error = err.message || 'Failed to load user information';
            } finally {
                this.loading = false;
            }
        },

        /**
         * Change the user's password.
         */
        async changePassword() {
            // Clear previous messages
            this.error = null;
            this.successMessage = null;

            // Validate passwords match
            if (this.passwordForm.newPassword !== this.passwordForm.confirmPassword) {
                this.error = 'New passwords do not match';
                return;
            }

            // Validate minimum length
            if (this.passwordForm.newPassword.length < 8) {
                this.error = 'Password must be at least 8 characters';
                return;
            }

            // Validate current password is different from new
            if (this.passwordForm.currentPassword === this.passwordForm.newPassword) {
                this.error = 'New password must be different from current password';
                return;
            }

            this.submitting = true;

            try {
                const resp = await authFetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        current_password: this.passwordForm.currentPassword,
                        new_password: this.passwordForm.newPassword
                    })
                });

                if (resp.status === 401) {
                    throw new Error('Current password is incorrect');
                }

                if (!resp.ok) {
                    const data = await resp.json().catch(() => null);
                    throw new Error(data?.detail || `Failed to change password (${resp.status})`);
                }

                // Success!
                this.successMessage = 'Password changed successfully';
                
                // Clear the form
                this.passwordForm = {
                    currentPassword: '',
                    newPassword: '',
                    confirmPassword: ''
                };

                // Auto-clear success message after 5 seconds
                setTimeout(() => {
                    this.successMessage = null;
                }, 5000);

            } catch (err) {
                console.error('Password change error:', err);
                this.error = err.message || 'Failed to change password';
            } finally {
                this.submitting = false;
            }
        }
    };
}
</script>

{% endblock %}
