# =============================================================================
# CRM Calendar Microservices — GitLab CI/CD Pipeline
# =============================================================================
#
# Pipeline Architecture (8 stages):
#
#   Feature branches: test → quality  (~3-5 min fast feedback)
#   Main branch:      test → quality → security:code → build → integration → scan:image → deploy
#
# Decision rationale:
#   - Feature branches get fast feedback: unit tests + Trivy code scan + SonarQube
#   - SonarQube runs on all branches (Community Branch Plugin for multi-branch support)
#   - Aikido source scan (SAST, SCA, secrets) catches security issues before building
#   - Docker images are built ONCE, then reused for integration tests (no double-build)
#   - Integration tests pull pre-built images via ci/docker-compose.ci-prebuilt.yml
#   - Aikido release gate registers the release for continuous monitoring + image scanning
#   - Trivy remains on all branches for fast, free, offline security scanning

stages:
  - test             # Unit tests + Trivy code scan per service (all branches)
  - quality          # SonarQube static analysis (all branches)
  - security:code    # Aikido source-level security scan (main only)
  - build            # Docker image builds (main only)
  - integration      # Integration tests against pre-built images (main only)
  - scan:image       # Trivy image scan + Aikido release gate & monitoring (main only)
  - deploy           # Trigger deployment repo (main only, manual gate)

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  # Container registry — works with GitLab CR or Docker Hub
  # Override CI_REGISTRY_IMAGE in project settings if using Docker Hub
  IMAGE_TAG: "$CI_REGISTRY_IMAGE"
  IMAGE_VERSION: "$CI_COMMIT_SHORT_SHA"

# =============================================================================
# DEFAULT — shared settings for Python-based jobs
# =============================================================================

default:
  image: python:3.11-slim
  cache:
    key:
      files:
        - "**/requirements.txt"
    paths:
      - .cache/pip
  before_script:
    - pip install --upgrade pip

# =============================================================================
# STAGE 1: UNIT TESTS — run per-service tests (ALL branches)
# =============================================================================
# Each service runs in parallel. DB-access services spin up Postgres.
# Coverage reports (Cobertura XML) are passed as artifacts to the quality stage.
# Runs on every branch push so developers get immediate feedback.

test:auth-service:
  stage: test
  needs: []
  script:
    - cd services/auth-service
    - pip install -r requirements.txt
    - pytest app/tests/ -n auto --cov=app --cov-report=xml:../../services/auth-service/coverage.xml --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: services/auth-service/coverage.xml
    paths:
      - services/auth-service/coverage.xml
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH

