# Alembic Configuration — CRM Calendar Platform
#
# Centralised migration config for all microservice database schemas.
# The connection URL is read from the DATABASE_URL environment variable
# in env.py; the placeholder below is never used at runtime.

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = postgresql://crm_user:crm_password@localhost:5432/crm_calendar

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for file_template date stamps (UTC recommended)
timezone = UTC

# Truncate long revision ids in file names
truncate_slug_length = 40

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
