# =============================================================================
# SonarCloud Scanner Configuration
# =============================================================================
# This file configures how sonar-scanner analyses the project.
# SonarCloud is a hosted service — no self-hosted server required.
#
# Prerequisites:
#   - SONAR_TOKEN set in GitLab CI/CD variables (masked)
#     Generate at: https://sonarcloud.io → My Account → Security → Tokens

# SonarCloud connection
sonar.host.url=https://sonarcloud.io
sonar.organization=workflow-platform

# Project identification
sonar.projectKey=workflow-platform_workflow
sonar.projectName=CRM Calendar Microservices
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=services/
sonar.sourceEncoding=UTF-8

# Python-specific settings
sonar.python.version=3.11

# Exclude non-application code from analysis
sonar.exclusions=\
  **/tests/**,\
  **/test_*.py,\
  **/conftest.py,\
  **/__pycache__/**,\
  **/static/**,\
  **/templates/**,\
  **/node_modules/**,\
  **/.pytest_cache/**,\
  **/htmlcov/**,\
  services/nginx/**,\
  services/shared/common/__pycache__/**

# Mark test directories (for coverage mapping, not for analysis)
sonar.tests=services/
sonar.test.inclusions=**/tests/**,**/test_*.py,**/conftest.py

# Coverage reports — produced by the unit test stage in CI
# Each service outputs a coverage.xml in Cobertura format
sonar.python.coverage.reportPaths=\
  services/auth-service/coverage.xml,\
  services/admin-bl-service/coverage.xml,\
  services/user-db-access-service/coverage.xml,\
  services/customer-db-access-service/coverage.xml,\
  services/job-db-access-service/coverage.xml,\
  services/user-bl-service/coverage.xml,\
  services/job-bl-service/coverage.xml,\
  services/customer-bl-service/coverage.xml,\
  services/frontend/coverage.xml,\
  services/maps-access-service/coverage.xml,\
  services/migration-runner/coverage.xml

# Quality gate — wait for SonarCloud to compute the result before exiting
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
