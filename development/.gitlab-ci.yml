# =============================================================================
# STAGE 4: CODE QUALITY — SonarCloud analysis (main only, INFORMATIONAL)
# =============================================================================
# SonarCloud provides a dashboard for code quality trends: bugs, code smells,
# duplication, and test coverage over time. It consumes coverage.xml artifacts
# from the unit test stage.
#
# IMPORTANT: This job is set to allow_failure: true (SOFT GATE).
# SonarCloud is kept for its dashboard and trend analysis, NOT as a pipeline
# gate. The actual code quality gate is Ruff (lint stage) which is open source,
# has no API limits, and runs on every branch.
#
# Why soft-fail?
#   - SonarCloud free tier has scan limits that can exhaust mid-pipeline
#   - Quota exhaustion causes spurious pipeline failures unrelated to code
#   - Ruff already enforces code quality rules as a hard gate
#   - SonarCloud's value is in its dashboard, not as a gate
#
# Prerequisites:
#   - SONAR_TOKEN set in GitLab CI/CD variables (masked)

sonarcloud-analysis:
  stage: quality
  needs:
    - test:auth-service
    - test:admin-bl-service
    - test:customer-db-access-service
    - test:customer-bl-service
    - test:job-db-access-service
    - test:job-bl-service
    - test:user-db-access-service
    - test:user-bl-service
    - test:frontend
    - test:maps-access-service
    - test:migration-runner
  image:
    name: ${IMG_PFX}sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"  # Full clone needed for blame/history analysis
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  before_script: []  # Override default pip install
  script:
    - |
      echo "========================================="
      echo "Running SonarCloud analysis (informational)"
      echo "========================================="
      echo ""
      echo "ℹ️  This job is informational only — it does not block the pipeline."
      echo "    Open source tools (Ruff, Bandit, Trivy) are the hard gates."
      echo ""

    - sonar-scanner -Dproject.settings=ci/sonar-project.properties || true

    - |
      echo ""
      echo "========================================="
      echo "SONARCLOUD ANALYSIS SUMMARY"
      echo "========================================="
      echo "ℹ️  SonarCloud analysis complete (informational — does not block pipeline)"
      echo ""
      echo "Dashboard: https://sonarcloud.io/project/overview?id=crm-calendar-microservices"
      echo ""
      echo "What SonarCloud tracks:"
      echo "  • Bug detection and code smell analysis"
      echo "  • Test coverage trends over time"
      echo "  • Code duplication metrics"
      echo "  • Technical debt estimation"
      echo ""
      echo "Pipeline gates are enforced by open source tools:"
      echo "  ✓ Code quality  → Ruff (lint stage)"
      echo "  ✓ Security SAST → Bandit (test stage)"
      echo "  ✓ Dependency CVEs → Trivy (test + build stages)"
      echo "  ✓ Secret detection → Gitleaks (test stage)"
  allow_failure: true  # SOFT — dashboard only, never blocks pipeline
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# STAGE 2: BUILD — build + scan images, push RC tags (main only)
# =============================================================================
# Builds all 11 service images, scans each with Trivy for OS-level and
# application-layer vulnerabilities, and pushes "release candidate" (RC)
# tags to the registry. The integration stage then pulls these RC images
# to test them. Final tags are only pushed in the push stage AFTER
# integration tests pass.
#
# Auto-detects Docker endpoint: uses host socket if mounted, otherwise
# falls back to DinD service on tcp://docker:2375.
#
# Flow: build all → scan all → push RC tags
# CRITICAL severity = pipeline fail (no push). HIGH = report artifact only.

build-scan:
  stage: build
  image: ${IMG_PFX}docker:27
  services:
    - name: ${IMG_PFX}docker:27-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    BUILDKIT_PROGRESS: "plain"
  before_script: []  # Override default — Docker job, not Python
  script:
    - |
      if [ -f scripts/seed-demo-data.sql ]; then
        cp scripts/seed-demo-data.sql services/migration-runner/
        echo "✅ Copied seed-demo-data.sql into migration-runner build context"
      else
        echo "⚠️  scripts/seed-demo-data.sql not found; migration-runner image will be built without demo seed data"
      fi

    # Auto-detect Docker endpoint (host socket vs DinD service)
    - |
      if docker info >/dev/null 2>&1; then
        echo "✅ Docker available via default socket"
      else
        echo "Socket not available, waiting for DinD on tcp://docker:2375..."
        export DOCKER_HOST=tcp://docker:2375
        for i in $(seq 1 15); do
          if docker info >/dev/null 2>&1; then break; fi
          sleep 2
        done
        if docker info >/dev/null 2>&1; then
          echo "✅ Docker available via DinD (tcp://docker:2375)"
        else
          echo "❌ Cannot connect to any Docker daemon"
          exit 1
        fi
      fi

    # Authenticate to Docker Hub for base image pulls (avoids rate limits)
    - |
      if [ -n "$DOCKERHUB_USER" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
        if echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin 2>/dev/null; then
          echo "✅ Authenticated to Docker Hub (200 pulls/6h)"
        else
          echo "⚠️  Docker Hub login failed (network issue?) — continuing with cached images"
        fi
      else
        echo "⚠️  DOCKERHUB_USER/DOCKERHUB_TOKEN not set — using unauthenticated pulls (100/6h)"
      fi

    # Install Trivy for local image scanning
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

    # Build → Scan → Push RC (all in one block so $SERVICES is shared)
    - |
      SERVICES="nginx auth-service user-db-access-service customer-db-access-service \
        job-db-access-service user-bl-service job-bl-service customer-bl-service \
        admin-bl-service maps-access-service notification-service migration-runner frontend"

      # ── Phase 0: PULL cached images for faster builds ──
      echo "========================================="
      echo "Pulling cached images from registry..."
      echo "========================================="
      for SERVICE in $SERVICES; do
        if docker pull "$IMAGE_TAG:$SERVICE-latest" 2>/dev/null; then
          echo "✓ Cached image pulled: $SERVICE"
        else
          echo "⚠️  No cached image for $SERVICE (first build or new service)"
        fi
      done
      echo ""

      # ── Phase 1: BUILD all images in parallel with BuildKit ──
      echo "========================================="
      echo "Building all images (parallel)..."
      echo "========================================="

      PIDS=""
      for SERVICE in $SERVICES; do
        (
          echo "Building: $SERVICE"
          docker build \
            --pull \
            --cache-from "$IMAGE_TAG:$SERVICE-latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -f services/$SERVICE/Dockerfile \
            -t "$IMAGE_TAG:$SERVICE-$IMAGE_VERSION" \
            -t "$IMAGE_TAG:$SERVICE-latest" \
            -t "$IMAGE_TAG:$SERVICE-rc" \
            services/ 2>&1 | sed "s/^/[$SERVICE] /"
        ) &
        PIDS="$PIDS $!"
      done

      BUILD_FAILED=0
      for PID in $PIDS; do
        if ! wait $PID; then
          BUILD_FAILED=1
        fi
      done

      if [ $BUILD_FAILED -eq 1 ]; then
        echo "❌ One or more builds failed"
        exit 1
      fi

      echo ""
      echo "✅ All images built successfully"
      echo ""

      # ── Phase 2: SCAN all images with Trivy ──
      SCAN_FAILED=0
      FAILED_SERVICES=""
      PASSED_SERVICES=""

      for SERVICE in $SERVICES; do
        echo "========================================="
        echo "Scanning image: $SERVICE"
        echo "========================================="

        if trivy image \
          --severity CRITICAL \
          --exit-code 1 \
          --ignore-unfixed \
          --format table \
          "$IMAGE_TAG:$SERVICE-$IMAGE_VERSION"; then
          PASSED_SERVICES="$PASSED_SERVICES $SERVICE"
        else
          SCAN_FAILED=1
          FAILED_SERVICES="$FAILED_SERVICES $SERVICE"
        fi

        trivy image \
          --severity HIGH,CRITICAL \
          --exit-code 0 \
          --ignore-unfixed \
          --format json \
          --output "trivy-image-${SERVICE}.json" \
          "$IMAGE_TAG:$SERVICE-$IMAGE_VERSION"
      done

      # ── SUMMARY (always at the bottom) ──
      echo ""
      echo "========================================="
      echo "TRIVY IMAGE SCAN SUMMARY"
      echo "========================================="

      if [ "$SCAN_FAILED" -eq 0 ]; then
        echo "✅ All images passed security scan (no CRITICAL vulnerabilities)"
        echo ""
        echo "Clean images (11):"
        for SERVICE in $SERVICES; do
          echo "  ✓ $SERVICE"
        done
      else
        echo "❌ CRITICAL vulnerabilities found in one or more images"
        echo ""

        if [ -n "$PASSED_SERVICES" ]; then
          PASS_COUNT=$(echo $PASSED_SERVICES | wc -w)
          echo "✅ Clean images ($PASS_COUNT):"
          for SERVICE in $PASSED_SERVICES; do
            echo "  ✓ $SERVICE"
          done
          echo ""
        fi

        FAIL_COUNT=$(echo $FAILED_SERVICES | wc -w)
        echo "❌ Images with CRITICAL vulnerabilities ($FAIL_COUNT):"
        for SERVICE in $FAILED_SERVICES; do
          echo "  ✗ $SERVICE"

          VULN_COUNT=$(cat "trivy-image-${SERVICE}.json" | \
            grep -o '"Severity":"CRITICAL"' | wc -l)

          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "    └─ $VULN_COUNT CRITICAL vulnerabilities found"

            cat "trivy-image-${SERVICE}.json" | \
              grep -A 5 '"Severity":"CRITICAL"' | \
              grep '"VulnerabilityID"' | \
              head -3 | \
              sed 's/.*"VulnerabilityID":"\([^"]*\)".*/       • \1/'
          fi
        done

        echo ""
        echo "ACTION REQUIRED:"
        echo "  1. Review the scan output above for details"
        echo "  2. Update Dockerfiles to fix vulnerable packages"
        echo "  3. Download trivy-image-*.json artifacts for full reports"
        echo ""
        echo "Images will NOT be pushed to the registry until vulnerabilities are resolved."
        exit 1
      fi

      # ── Phase 3: PUSH RC tags (release candidates for integration testing) ──
      echo ""
      echo "========================================="
      echo "Authenticating to container registry"
      echo "========================================="
      echo "Registry: ${CI_REGISTRY:-registry.gitlab.com}"
      echo "User: $CI_REGISTRY_USER"

      if [ -z "$CI_REGISTRY" ]; then
        echo "⚠️  CI_REGISTRY not set, using Docker Hub"
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin
      else
        echo "Using GitLab Container Registry: $CI_REGISTRY"
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
      fi

      if [ $? -ne 0 ]; then
        echo ""
        echo "❌ Docker login failed!"
        echo ""
        echo "TROUBLESHOOTING:"
        echo "  • Verify CI/CD variables are set in GitLab project settings:"
        echo "    - CI_REGISTRY_USER (auto-provided by GitLab)"
        echo "    - CI_REGISTRY_PASSWORD (auto-provided by GitLab)"
        echo "  • For Docker Hub, manually set:"
        echo "    - CI_REGISTRY_USER = your Docker Hub username"
        echo "    - CI_REGISTRY_PASSWORD = your Docker Hub access token"
        echo "    - CI_REGISTRY_IMAGE = username/repository"
        echo "  • Check that Deploy Tokens or Personal Access Tokens have write access"
        exit 1
      fi

      echo "✅ Authentication successful"
      echo ""

      echo "========================================="
      echo "Pushing RC (release candidate) tags..."
      echo "========================================="
      for SERVICE in $SERVICES; do
        if docker push "$IMAGE_TAG:$SERVICE-rc"; then
          echo "✅ Pushed $SERVICE-rc"
        else
          echo "❌ Failed to push $SERVICE-rc"
          exit 1
        fi
      done

      echo ""
      echo "========================================="
      echo "✅ All RC images pushed — ready for integration testing"
      echo "========================================="
  artifacts:
    paths:
      - trivy-image-*.json
    expire_in: 1 week
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# STAGE 5: PUSH — re-tag RC → final + latest, push to registry (main only)
# =============================================================================
# Only runs AFTER integration tests pass on main. Pulls the RC images that
# were already built, scanned, and integration-tested, then re-tags them
# with the final version tag and 'latest' before pushing to the registry.
#
# This ensures only tested, scanned images reach the registry.

push-images:
  stage: push
  image: ${IMG_PFX}docker:27
  services:
    - name: ${IMG_PFX}docker:27-dind
      alias: docker
      command: ["--tls=false"]
  needs:
    - build-scan
    - integration-tests-main
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script: []
  script:
    # Auto-detect Docker endpoint (host socket vs DinD service)
    - |
      if docker info >/dev/null 2>&1; then
        echo "✅ Docker available via default socket"
      else
        echo "Socket not available, waiting for DinD on tcp://docker:2375..."
        export DOCKER_HOST=tcp://docker:2375
        for i in $(seq 1 15); do
          if docker info >/dev/null 2>&1; then break; fi
          sleep 2
        done
        if docker info >/dev/null 2>&1; then
          echo "✅ Docker available via DinD (tcp://docker:2375)"
        else
          echo "❌ Cannot connect to any Docker daemon"
          exit 1
        fi
      fi

    - |
      SERVICES="nginx auth-service user-db-access-service customer-db-access-service \
        job-db-access-service user-bl-service job-bl-service customer-bl-service \
        admin-bl-service maps-access-service notification-service migration-runner frontend"

      # ── Authenticate to registry ──
      echo "========================================="
      echo "Authenticating to container registry"
      echo "========================================="

      if [ -z "$CI_REGISTRY" ]; then
        echo "⚠️  CI_REGISTRY not set, using Docker Hub"
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin
      else
        echo "Using GitLab Container Registry: $CI_REGISTRY"
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
      fi

      if [ $? -ne 0 ]; then
        echo "❌ Docker login failed!"
        exit 1
      fi

      echo "✅ Authentication successful"
      echo ""

      # ── Pull RC images, re-tag, and push final tags ──
      echo "========================================="
      echo "Re-tagging RC → final version + latest"
      echo "========================================="

      for SERVICE in $SERVICES; do
        echo ""
        echo "── $SERVICE ──"

        # Pull the RC image
        docker pull "$IMAGE_TAG:$SERVICE-rc"

        # Tag with version and latest
        docker tag "$IMAGE_TAG:$SERVICE-rc" "$IMAGE_TAG:$SERVICE-$IMAGE_VERSION"
        docker tag "$IMAGE_TAG:$SERVICE-rc" "$IMAGE_TAG:$SERVICE-latest"

        # Push final tags
        if docker push "$IMAGE_TAG:$SERVICE-$IMAGE_VERSION"; then
          echo "✅ Pushed $SERVICE-$IMAGE_VERSION"
        else
          echo "❌ Failed to push $SERVICE-$IMAGE_VERSION"
          exit 1
        fi

        if docker push "$IMAGE_TAG:$SERVICE-latest"; then
          echo "✅ Pushed $SERVICE-latest"
        else
          echo "❌ Failed to push $SERVICE-latest"
          exit 1
        fi
      done

      echo ""
      echo "========================================="
      echo "✅ All images pushed successfully"
      echo "========================================="
      echo ""
      echo "Images are integration-tested, security-scanned, and ready for deployment."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# STAGE 6: AIKIDO RELEASE GATE — security dashboard (main only, INFORMATIONAL)
# =============================================================================
# Aikido provides a security dashboard with SAST, SCA, secrets detection,
# IaC scanning, and continuous post-deploy CVE monitoring.
#
# IMPORTANT: This job is set to allow_failure: true (SOFT GATE).
# Aikido is kept for its dashboard, continuous monitoring, and the additional
# context it provides alongside the open source tools. It does NOT block
# the pipeline — open source tools (Bandit, Gitleaks, Trivy) are the hard gates.
#
# Why soft-fail?
#   - Aikido free tier has limited API quota (scans per month)
#   - Quota exhaustion causes spurious pipeline failures
#   - All security concerns Aikido checks are already covered by FOSS tools:
#       SAST         → Bandit (hard gate in test stage)
#       SCA          → Trivy (hard gate in test + build stages)
#       Secrets      → Gitleaks (hard gate in test stage)
#       IaC scanning → Trivy (checks Dockerfiles/Compose)
#   - Aikido's unique value is its dashboard and continuous monitoring post-deploy
#
# NOTE: Using 'scan' instead of 'scan-release' for free tier compatibility.

aikido-release-gate:
  stage: release
  image: ${IMG_PFX}node:22
  needs:
    - push-images
    - integration-tests-main
  before_script: []  # Override default — Node job, not Python
  script:
    - npm install --global @aikidosec/ci-api-client
    - |
      echo "========================================="
      echo "Running Aikido security scan (informational)"
      echo "========================================="
      echo ""
      echo "ℹ️  This job is informational only — it does not block the pipeline."
      echo "    Open source tools (Bandit, Gitleaks, Trivy) are the hard gates."
      echo ""

    - |
      # Use 'scan' instead of 'scan-release' for free tier
      aikido-api-client scan \
        --apikey "$AIKIDO_CLIENT_API_KEY" \
        --fail-on-sast \
        --fail-on-dependencies \
        --fail-on-secrets \
        --fail-on-iac || true

    - |
      echo ""
      echo "========================================="
      echo "AIKIDO SECURITY SCAN SUMMARY"
      echo "========================================="
      echo "ℹ️  Aikido scan complete (informational — does not block pipeline)"
      echo ""
      echo "Dashboard: https://app.aikido.dev"
      echo ""
      echo "What Aikido tracks:"
      echo "  • SAST (code vulnerability patterns)"
      echo "  • SCA (dependency CVEs — different DB than Trivy)"
      echo "  • Secrets detection"
      echo "  • IaC misconfiguration (Dockerfiles, Compose)"
      echo "  • License compliance"
      echo "  • Continuous post-deploy CVE monitoring"
      echo ""
      echo "Pipeline gates are enforced by open source tools:"
      echo "  ✓ Python SAST     → Bandit (test stage)"
      echo "  ✓ Dependency CVEs → Trivy (test + build stages)"
      echo "  ✓ Secrets         → Gitleaks (test stage)"
      echo "  ✓ Container CVEs  → Trivy image scan (build stage)"
  allow_failure: true  # SOFT — dashboard only, never blocks pipeline
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# STAGE 7: DEPLOY — trigger deployment repo (main only)
# =============================================================================
# After all tests and scans pass, trigger the deployment repository pipeline.
# Automatic — fires as soon as images are built and integration tests pass.
# The deployment repo has its own manual gate before spinning up infrastructure.
#
# Decision: Safe to auto-trigger because the deploy repo pipeline has a MANUAL
# gate before bring-up of staging infrastructure (trigger-infra-staging).
# Production requires a second manual gate (promote-to-production) after
# staging tests pass. So this trigger only starts validation + tag updates.
#
# Note: Deploy depends only on build-scan-push and integration-tests (hard gates).
# It does NOT depend on Aikido (soft gate) — free-tier quota exhaustion
# should never prevent deployment of verified, scanned code.

# =============================================================================
# STAGE 7a: UPDATE MANIFESTS — auto-update Kustomize image tags (main only)
# =============================================================================
# After Docker images are successfully built and pushed, automatically update
# the Kustomize overlay files with the new image tag for dev environment only.
# Staging and production manifests remain unchanged and must be updated manually.
#
# This implements a GitOps-style workflow where deployment manifests stay
# in sync with the latest built images.
#
# Flow:
#   1. Clone deployment repo (yr4-projectdeploymentrepo)
#   2. Update image tag in kubernetes/overlays/dev/kustomization.yaml
#   3. Commit and push changes back to deployment repo
#   4. Staging and Production remain untouched (manual promotion workflow)
#
# Prerequisites:
#   - DEPLOY_REPO_URL — git URL to deployment repo (HTTPS with embedded token)
#   - DEPLOY_REPO_BRANCH — target branch (default: main)
#   - CI_JOB_TOKEN — GitLab's built-in CI token for pushing (auto-provided)

update-manifests:
  stage: deploy
  image: ${IMG_PFX}alpine:latest
  needs:
    - push-images
  before_script:
    - apk add --no-cache git curl
  script:
    - |
      echo "========================================="
      echo "Updating Kustomize manifests with new image tags"
      echo "========================================="
      echo ""

      # Construct deployment repo URL — prefer GITLAB_API_TOKEN, fall back to CI_JOB_TOKEN
      # CI_JOB_TOKEN requires: deployment repo > Settings > CI/CD > Job token permissions
      #   → add this project (yr4-projectdevelopmentrepo) with write access
      # GITLAB_API_TOKEN: project/group token with write_repository scope (set in CI/CD vars)
      if [ -n "$GITLAB_API_TOKEN" ]; then
        DEPLOY_REPO_URL="https://oauth2:${GITLAB_API_TOKEN}@gitlab.comp.dkit.ie/finalproject/Prototypes/yr4-projectdeploymentrepo.git"
      else
        DEPLOY_REPO_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.comp.dkit.ie/finalproject/Prototypes/yr4-projectdeploymentrepo.git"
      fi
      DEPLOY_REPO_BRANCH="${DEPLOY_REPO_BRANCH:-main}"

      echo "Image tag: $IMAGE_TAG:*-$IMAGE_VERSION"
      echo "Dev environment branch: $DEPLOY_REPO_BRANCH"
      echo ""

      # Clone the deployment repository
      echo "Cloning deployment repository..."
      git clone --depth 1 \
        --branch "$DEPLOY_REPO_BRANCH" \
        "$DEPLOY_REPO_URL" \
        deployment-repo

      cd deployment-repo
      git config user.name "CI Pipeline"
      git config user.email "ci@pipeline.local"
      echo ""

      # ── Phase 1: Update DEV environment ──
      echo "========================================="
      echo "Phase 1: Updating dev environment"
      echo "========================================="

      DEV_KUSTOMIZE="kubernetes/overlays/dev/kustomization.yaml"
      if [ -f "$DEV_KUSTOMIZE" ]; then
        echo "Found: $DEV_KUSTOMIZE"

        # Extract current version from kustomization.yaml
        CURRENT_TAG=$(grep "app.kubernetes.io/version:" "$DEV_KUSTOMIZE" | head -1 | awk -F'"' '{print $2}' || echo "unknown")
        echo "Current version: $CURRENT_TAG"
        echo "New version: $IMAGE_VERSION"

        # Update the version label for GitOps tracking
        # NOTE: Kustomize 'images:' with newTag cannot handle per-service tags
        # (all services share the same image name with different tag prefixes).
        # Actual image pinning to specific versions happens at deploy time via
        # sed in the deploy-staging / deploy-production jobs.
        sed -i "s|app.kubernetes.io/version: .*|app.kubernetes.io/version: \"$IMAGE_VERSION\"|" "$DEV_KUSTOMIZE"

        echo "✅ Updated dev environment"
      else
        echo "❌ File not found: $DEV_KUSTOMIZE"
        exit 1
      fi
      echo ""

      # ── Phase 2: Commit and push changes ──
      echo "========================================="
      echo "Phase 2: Committing and pushing changes"
      echo "========================================="

      # Stage the updated files
      git add kubernetes/overlays/dev/kustomization.yaml

      # Check if there are any changes to commit
      if git diff --cached --quiet; then
        echo "ℹ️  No changes detected (tags may already be current)"
        echo ""
        echo "========================================="
        echo "UPDATE MANIFESTS SUMMARY"
        echo "========================================="
        echo "ℹ️  Manifests are already up-to-date"
        echo ""
        echo "Current image tag: $IMAGE_TAG:*-$IMAGE_VERSION"
        echo "Environments updated:"
        echo "  ✓ Dev (kubernetes/overlays/dev/kustomization.yaml)"
        echo "  ✗ Staging (remains unchanged for manual promotion)"
        echo "  ✗ Production (remains unchanged for manual promotion)"
        echo ""
      else
        # Commit with descriptive message including commit info
        COMMIT_MSG="chore: update dev image tag to $IMAGE_VERSION [skip ci]

        Triggered by build-scan-push job (commit: $CI_COMMIT_SHORT_SHA)
        Source branch: $CI_COMMIT_BRANCH
        Updated environments:
          - kubernetes/overlays/dev/kustomization.yaml

        Staging and Production remain unchanged and require manual promotion."

        git commit -m "$COMMIT_MSG"

        # Push to the deployment repo
        git push origin "${DEPLOY_REPO_BRANCH:-main}" || {
          echo ""
          echo "❌ Failed to push to deployment repo (403 / permission denied)"
          echo ""
          echo "FIX: Go to yr4-projectdeploymentrepo > Settings > CI/CD > Job token permissions"
          echo "     → Add 'finalproject/Prototypes/yr4-projectdevelopmentrepo' with write access"
          echo ""
          echo "OR: Create a project access token with write_repository scope and set"
          echo "    GITLAB_API_TOKEN as a CI/CD variable in yr4-projectdevelopmentrepo"
          exit 1
        }

        echo "✅ Changes pushed to deployment repository"
        echo ""
        echo "========================================="
        echo "UPDATE MANIFESTS SUMMARY"
        echo "========================================="
        echo "✅ Dev environment manifests updated and deployed automatically"
        echo ""
        echo "Image tag: $IMAGE_TAG:*-$IMAGE_VERSION"
        echo "Environments updated:"
        echo "  ✓ Dev (kubernetes/overlays/dev/kustomization.yaml)"
        echo "  ✗ Staging (remains unchanged for manual promotion)"
        echo "  ✗ Production (remains unchanged for manual promotion)"
        echo ""
        echo "Deployment repo: ${DEPLOY_REPO_URL}"
        echo "Next steps:"
        echo "  1. Monitor dev deployment to verify image update"
        echo "  2. When ready, manually update staging/production manifests"
        echo ""
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
      allow_failure: true  # Don't fail pipeline if manifest update fails
  environment:
    name: deployment-repo
    url: "${DEPLOY_REPO_URL}"

# =============================================================================
# STAGE 7b: TRIGGER DEPLOY — fire deployment repo pipeline (main only)
# =============================================================================
# Uses GitLab native cross-project trigger to start the CD pipeline.
# Passes image details so the deploy repo knows what version to deploy.
#
# The deploy repo pipeline validates manifests, updates staging tags,
# then WAITS for manual approval before spinning up infra and deploying.
#
# REQUIRED CI/CD VARIABLES (set in GitLab > Settings > CI/CD > Variables):
#   DEPLOY_REPO_TRIGGER_TOKEN — Pipeline trigger token from the deploy repo
#   DEPLOY_REPO_TRIGGER_URL   — Trigger API URL for the deploy repo

trigger-deploy:
  stage: deploy
  needs:
    - push-images
    - integration-tests-main
  trigger:
    project: finalproject/Prototypes/yr4-projectdeploymentrepo
    branch: main
    strategy: depend
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE
    IMAGE_VERSION: $CI_COMMIT_SHORT_SHA
    SOURCE_COMMIT: $CI_COMMIT_SHA
    SOURCE_BRANCH: $CI_COMMIT_BRANCH
    PIPELINE_MODE: $PIPELINE_MODE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
